name: Build ExtraTV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate icons
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p extratv-firetv/app/src/main/res/$dir
          done
          convert -size 192x192 xc:#E50914 -font DejaVu-Sans-Bold -pointsize 80 -fill white -gravity center -annotate 0 "ET" extratv-firetv/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert extratv-firetv/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 144x144 extratv-firetv/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert extratv-firetv/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 96x96 extratv-firetv/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert extratv-firetv/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 72x72 extratv-firetv/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert extratv-firetv/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 48x48 extratv-firetv/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Make gradlew executable
        run: chmod +x extratv-firetv/gradlew

      - name: Build APK
        working-directory: extratv-firetv
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExtraTV-FireTV.apk
          path: extratv-firetv/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
